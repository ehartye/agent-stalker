<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-stalker</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-brand">
      <span class="icon"></span>
      agent-stalker
    </div>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="Search events..." autocomplete="off">
    </div>
    <div class="header-controls">
      <div class="live-indicator" id="liveToggle" title="Toggle auto-refresh">
        <span class="live-dot"></span>
        <span id="liveLabel">LIVE</span>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="session-dropdown">
      <button class="session-dropdown-trigger" id="sessionDropdownTrigger">
        <span id="sessionDropdownLabel">No sessions selected</span>
        <span class="chevron">&#9662;</span>
      </button>
      <div class="session-dropdown-panel" id="sessionDropdownPanel">
        <div class="session-search">
          <input type="text" id="sessionSearchInput" placeholder="Search sessions..." autocomplete="off">
        </div>
        <div class="session-group">
          <div class="session-group-header" id="activeGroupHeader">
            Active <span class="count" id="activeSessionCount">0</span>
          </div>
          <div class="session-group-list" id="activeSessionList"></div>
        </div>
        <div class="session-group">
          <div class="session-group-header collapsible collapsed" id="archivedGroupHeader">
            Archived <span class="count" id="archivedSessionCount">0</span>
            <span class="chevron">&#9662;</span>
          </div>
          <div class="session-group-list collapsed" id="archivedSessionList"></div>
        </div>
      </div>
    </div>
    <div class="session-accordions" id="sessionAccordions"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <select class="filter-select" id="toolFilter">
        <option value="">All tools</option>
      </select>
      <select class="filter-select" id="eventTypeFilter">
        <option value="">All event types</option>
        <option value="SessionStart">SessionStart</option>
        <option value="SessionEnd">SessionEnd</option>
        <option value="PreToolUse">PreToolUse</option>
        <option value="PostToolUse">PostToolUse</option>
        <option value="PostToolUseFailure">PostToolUseFailure</option>
        <option value="SubagentStart">SubagentStart</option>
        <option value="SubagentStop">SubagentStop</option>
        <option value="TaskCompleted">TaskCompleted</option>
        <option value="TeammateIdle">TeammateIdle</option>
        <option value="UserPromptSubmit">UserPromptSubmit</option>
        <option value="Stop">Stop</option>
      </select>
      <select class="filter-select" id="timeRangeFilter">
        <option value="">All time</option>
        <option value="5m">Last 5 min</option>
        <option value="15m">Last 15 min</option>
        <option value="1h">Last 1 hour</option>
        <option value="6h">Last 6 hours</option>
        <option value="1d">Last 24 hours</option>
      </select>
      <div class="toolbar-spacer"></div>
      <span class="event-count" id="eventCountLabel">0 events</span>
    </div>
    <div class="filter-chips-bar" id="filterChipsBar"></div>

    <div class="timeline-container" id="timeline">
      <div class="timeline-empty">
        <div class="icon"></div>
        <div>No events captured yet</div>
        <div style="font-size:11px;color:var(--text-dim)">Events will appear here as Claude Code runs</div>
      </div>
    </div>

    <div class="detail-pane" id="detailPane">
      <div class="detail-header">
        <h3 id="detailTitle">Event Detail</h3>
        <button class="detail-close" id="detailClose">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-stat">Sessions: <span class="val" id="statSessions">0</span></div>
    <div class="footer-stat">Events: <span class="val" id="statEvents">0</span></div>
    <div class="footer-stat">Tools: <span class="val" id="statTools">0</span></div>
    <div class="footer-stat">Agents: <span class="val" id="statAgents">0</span></div>
    <div class="footer-stat">Tasks: <span class="val" id="statTasks">0</span></div>
    <div class="footer-spacer"></div>
    <div class="footer-time" id="footerTime"></div>
  </footer>
</div>

<script src="/app.js"></script>
</body>
</html>
